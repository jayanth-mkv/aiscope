<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="720" viewBox="0 0 1400 720" role="img" aria-labelledby="title desc">
  <title id="title">AIScope architecture</title>
  <desc id="desc">Instruction sources enter a local scope engine and become explainable diagnostics and machine-readable outputs.</desc>
  <rect width="1400" height="720" fill="#F4F7F8"/>
  <rect x="28" y="28" width="1344" height="664" fill="none" stroke="#111A1E" stroke-width="2"/>
  <text x="68" y="78" fill="#607D88" font-family="Courier New, monospace" font-size="14" font-weight="700" letter-spacing="2.5">AISCOPE / SYSTEM MAP 01</text>
  <text x="68" y="142" fill="#111A1E" font-family="Georgia, Times New Roman, serif" font-size="50" font-weight="700">From scattered instructions to scoped evidence.</text>
  <line x1="68" y1="174" x2="1332" y2="174" stroke="#C9D7DC" stroke-width="2"/>

  <text x="68" y="226" fill="#607D88" font-family="Courier New, monospace" font-size="14" font-weight="700" letter-spacing="2">01 / SOURCES</text>
  <text x="1050" y="226" fill="#607D88" font-family="Courier New, monospace" font-size="14" font-weight="700" letter-spacing="2">03 / OUTPUTS</text>

  <g font-family="Arial, Helvetica, sans-serif">
    <rect x="68" y="254" width="278" height="236" rx="2" fill="#FFFFFF" stroke="#111A1E" stroke-width="3"/>
    <text x="96" y="297" fill="#111A1E" font-size="22" font-weight="700">Instruction files</text>
    <g fill="#E2EAED" stroke="#607D88" stroke-width="1.5">
      <rect x="96" y="325" width="222" height="34"/><rect x="96" y="371" width="222" height="34"/><rect x="96" y="417" width="222" height="34"/>
    </g>
    <g fill="#111A1E" font-family="Courier New, monospace" font-size="14">
      <text x="112" y="347">AGENTS.md / CLAUDE.md</text><text x="112" y="393">.cursor / .github</text><text x="112" y="439">rules / skills / modes</text>
    </g>

    <circle cx="700" cy="372" r="166" fill="#E2EAED" stroke="#111A1E" stroke-width="3"/>
    <text x="700" y="198" fill="#607D88" font-family="Courier New, monospace" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="2">02 / LOCAL SCOPE ENGINE</text>
    <circle cx="700" cy="372" r="116" fill="#111A1E"/>
    <text x="700" y="337" fill="#F4F7F8" font-family="Georgia, Times New Roman, serif" font-size="29" font-weight="700" text-anchor="middle">Scope engine</text>
    <text x="700" y="378" fill="#C9D7DC" font-family="Courier New, monospace" font-size="14" text-anchor="middle" letter-spacing="1">PARSE → NORMALIZE</text>
    <text x="700" y="408" fill="#C9D7DC" font-family="Courier New, monospace" font-size="14" text-anchor="middle" letter-spacing="1">COMPARE → EXPLAIN</text>
    <path d="M700 206v40M700 498v40M534 372h50M816 372h50" stroke="#607D88" stroke-width="5"/>

    <rect x="1050" y="254" width="282" height="236" rx="2" fill="#FFFFFF" stroke="#111A1E" stroke-width="3"/>
    <text x="1078" y="297" fill="#111A1E" font-size="22" font-weight="700">Auditable results</text>
    <g fill="#111A1E" font-family="Courier New, monospace" font-size="14">
      <text x="1078" y="343">TUI     compiler diagnostics</text><text x="1078" y="383">CI      stable exit codes</text><text x="1078" y="423">JSON    source spans</text><text x="1078" y="463">PNG     shareable cards</text>
    </g>
  </g>

  <g fill="none" stroke="#111A1E" stroke-width="4">
    <path d="M346 372H502"/><path d="M898 372h152"/>
  </g>
  <g fill="#111A1E"><path d="M502 372l-15-9v18Z"/><path d="M1050 372l-15-9v18Z"/></g>

  <rect x="68" y="568" width="1264" height="72" fill="#111A1E"/>
  <text x="700" y="612" fill="#F4F7F8" font-family="Courier New, monospace" font-size="18" text-anchor="middle" letter-spacing="1">READ-ONLY · NO NETWORK · NO LLM CALLS · DETERMINISTIC OUTPUT</text>
  <text x="68" y="668" fill="#607D88" font-family="Courier New, monospace" font-size="13">EVERY DIAGNOSTIC RETAINS ITS SOURCE AND SCOPE</text>
</svg>
